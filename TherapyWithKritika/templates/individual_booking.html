{% extends "base.html"  %}

{% block title %}
Booking
{% endblock %}
 {% block style %}
 <style>
/* Home Button */
.top-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 18px;
  background: white;
  color: #4ca1af;
  border-radius: 25px;
  text-decoration: none;
  font-weight: 500;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.top-btn:hover {
  background: #4ca1af;
  color: white;
}
</style>
 {% endblock %}
{% block content1 %}
<form method="POST">
    <h3 align="center">Individual Booking</h3>
    <div class="form-group">
        <label for="email"> Email Address</label>
        <input type="email" name="email" class="form-control" id="email" aria-placeholder="Enter Email Address" required/>
    </div>
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" name="name" class="form-control" id="name" aria-placeholder="Enter Your Name" required/>
    </div>
    <div class="form-group">
        <label for="age">Age</label>
        <input type="number" name="age" class="form-control" id="age" aria-placeholder="Enter Your Age" required/>
    </div>
    <div class="form-group">
        <label for="occupation">Occupation</label>
        <input type="text" name="occupation" class="form-control" id="occupation" aria-placeholder="Enter occupation"/>
    </div>
    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="number" name="phone" class="form-control" id="phone" aria-placeholder="Enter Phone Number"/>
    </div>

    <div class="form-group">
        <label for="alt_phone">Alternate phone Number</label>
        <input type="number" name="alt_phone" class="form-control" id="alt_phone" aria-placeholder="Enter alternate Phone Number" required/>
    </div>

    <div class="form-group">
        <label>Resident of India</label><br>

        <input type="radio" id="resident_yes" name="resident" value="Yes" checked>
        <label for="resident_yes">Yes</label>

        <input type="radio" id="resident_no" name="resident" value="No">
        <label for="resident_no">No</label>
    </div>

    <div class="form-group">
        <label>Do you have insurance and plan to claim it for the sessions?</label><br>

        <input type="radio" id="insurance_yes" name="insurance" value="Yes" checked>
        <label for="insurance_yes">Yes</label>

        <input type="radio" id="insurance_no" name="insurance" value="No">
        <label for="insurance_no">No</label>
    </div>

    <div class="form-group">
        <label for="goal">Please share your concerns briefly.</label>
        <input type="text" name="concern" class="form-control" id="concern" aria-placeholder=""/>
    </div>

    <div class="form-group">
        <label for="goal">Please share your goals of therapy if you have any in mind.</label>
        <input type="text" name="goal" class="form-control" id="goal" aria-placeholder=""/>
    </div>

    <div class="form-group">
        <label for="past">Please share any past relevant psychiatric treatment or therapy, if any.</label>
        <input type="text" name="past" class="form-control" id="past" aria-placeholder=""/>
    </div>

    <br />
    <button type="submit" class="btn btn-primary">Submit</button>
</form>

<a href="/" class="top-btn">Home</a>

{% endblock %}
