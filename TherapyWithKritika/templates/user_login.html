{% extends "base.html" %}
{% block title %}
Login
{% endblock %}
{% block style %}
<style>
/* Home Button */
.top-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 18px;
  background: white;
  color: #4ca1af;
  border-radius: 25px;
  text-decoration: none;
  font-weight: 500;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.top-btn:hover {
  background: #4ca1af;
  color: white;
}
</style>
 {% endblock %}
{% block content %}
<form method="POST">
    <h3 align="center">User Name</h3>
    <div class="form-group">
        <label for="uname">User Name</label>
        <input type="text" name="uname" class="form-control" id="uname" aria-placeholder="Enter User Name" required/>
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" class="form-control" id="password" aria-placeholder="Enter Your Password" required/>
    </div>

    <br />
    <button type="submit" class="btn btn-primary">Submit</button>

    <a href="/" class="top-btn">Home</a>

{% endblock %}
