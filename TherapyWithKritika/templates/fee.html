<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Session Fees</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to top, #4ca1af, #c4e0e5);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Home Button */
.top-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 18px;
  background: white;
  color: #4ca1af;
  border-radius: 25px;
  text-decoration: none;
  font-weight: 500;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.top-btn:hover {
  background: #4ca1af;
  color: white;
}

/* Card */
.fee-card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  width: 320px;
  animation: fadeIn 0.8s ease;
}

/* Heading */
h3 {
  margin-bottom: 10px;
}

p {
  color: #666;
}

/* Buttons */
.btn-group {
  margin-top: 25px;
}

.btn {
  padding: 12px 22px;
  margin: 5px;
  border: none;
  border-radius: 30px;
  background: #e0e0e0;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 500;
}

.btn:hover {
  background: #4ca1af;
  color: white;
  transform: scale(1.05);
}

.btn.active {
  background: #4ca1af;
  color: white;
}

/* Fee display */
.fee-display {
  margin-top: 25px;
  font-size: 24px;
  font-weight: 600;
  color: #333;
  opacity: 0;
  transform: translateY(15px);
  transition: 0.4s ease;
}

.fee-display.show {
  opacity: 1;
  transform: translateY(0);
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>
<!-- Home Button -->
<a href="/" class="top-btn">Home</a>

<!-- Card -->
<div class="fee-card">
  <h3>Session Fees</h3>
  <p>Select your location</p>

  <div class="btn-group">
    <button class="btn" onclick="setFee('india', this)">India</button>
    <button class="btn" onclick="setFee('intl', this)">International</button>
  </div>

  <div id="fee" class="fee-display"></div>
</div>

<script>
function setFee(type, btn) {
  let feeText = "";

  document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  if (type === "india") {
    feeText = "₹2500 / session";
  } else {
    feeText = "Fees shared during booking";
  }

  const feeDiv = document.getElementById("fee");
  feeDiv.innerText = feeText;
  feeDiv.classList.add("show");
}
</script>

</body>
</html>
