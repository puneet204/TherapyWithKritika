{% extends "base.html" %}
{% block title %}
Add_Note
{% endblock %}
{% block content %}
<div class="hero-actions">
        <a href="/" class="btn-primary">HOME</a>
</div>
<div class="container">
    <h2>Select User</h2>
    <form method="POST" action="/download">
        <div class="form-group">
            <label for="download">Select user for whom Notes are to be downloaded.</label>
            <select id="download" name="download" required>
              <option value="" disabled selected>Select email from below</option>
              {% for data in content %}
              <option>{{ data.id }}-{{ data.email }} - {{ data.firstName }} {{ data.lastName }}</option>
              {% endfor %}
            </select>
          </div>
        <button type="submit" class="btn btn-primary">Download Notes</button>
    </form>
</div>

{% endblock %}
