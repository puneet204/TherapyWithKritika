{% extends "base.html" %}
{% block title %}
admin
{% endblock %}
{% block content %}
<nav id="nav">
    <ul class="nav-links" id="navLinks">
        <li><a href="/" class="nav-cta">HOME</a></li>
    </ul>
</nav>
<form method="POST">
    <h3 align="center">User Name</h3>
    <div class="form-group">
        <label for="uname"> Email Address</label>
        <input type="text" name="uname" class="form-control" id="uname" aria-placeholder="Enter User Name" required/>
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" class="form-control" id="password" aria-placeholder="Enter Your Password" required/>
    </div>
    {% if reqd == 'YES' %}
    <div class="form-group">
            <label for="table">What brings you here?</label>
            <select id="table" name="table" required>
              <option value="" disabled selected>Select db table to view</option>
              <option>Users</option>
              <option>Clients</option>
              <option>Notes</option>
            </select>
          </div>
    {% endif %}
    <br />
    <button type="submit" class="btn btn-primary">Submit</button>

{% endblock %}
