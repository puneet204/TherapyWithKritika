 {% extends "base.html" %}
 {% block content %}

 <!-- CONTACT -->
  <form method="POST">
  <section id="contact">
    <div class="hero-actions">
        <a href="/" class="btn-primary">HOME</a>
    </div>
      <div class="contact-form">
        <form id="contactForm">
          <h2><center>Registration and Onboarding</center></h2>
          <div class="form-row">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="abc@example.com" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="firstName" placeholder="" required />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lastName" placeholder="" required />
            </div></div>
            <div class="form-group">
              <label for="age">Age</label>
              <input type="number" id="age" name="age" placeholder="" />
            </div>
            <div class="form-group">
              <label for="occupation">Occupation</label>
              <input type="text" id="occupation" name="occupation" placeholder="" />
            </div>
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="number" id="phone" name="phone" placeholder="+91-XXXXXXXXXX" required />
            </div>
            <div class="form-group">
              <label for="alt_phone">Emergency Contact</label>
              <input type="number" id="alt_phone" name="alt_phone" placeholder="+91-XXXXXXXXXX" required />
            </div>
          <!--/div-->
            <div class="form-group">
                <label for="resident">Resident of India</label>
                <select id="resident" name="resident" required onchange="toggleCountry()">
                    <option value="" disabled selected>Select from below</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

<!-- Hidden Country Field -->
            <div class="form-group" id="countryField" style="display: none;">
            <label for="country">Please specify your country</label>
                <input type="text" id="country" name="country" placeholder="Enter your country">
            </div>

            <script>
                function toggleCountry() {
                    const resident = document.getElementById("resident").value;
                    const countryField = document.getElementById("countryField");
                    const countryInput = document.getElementById("country");

                    if (resident === "No") {
                        countryField.style.display = "block";
                        countryInput.setAttribute("required", "true");
                    } 
                    else {
                        countryField.style.display = "none";
                        countryInput.removeAttribute("required");
                        countryInput.value = "";
                    }
                }
            </script>
          <div class="form-group">
            <label for="insurance">Do you have the Insurance?</label>
            <select id="insurance" name="insurance" required>
              <option value="" disabled selected>Select from below</option>
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="reason">What brings you here?</label>
            <select id="reason" name="reason" required>
              <option value="" disabled selected>Select a topic</option>
              <option>Anxiety or worry</option>
              <option>Depression or low mood</option>
              <option>Trauma or PTSD</option>
              <option>Grief or loss</option>
              <option>Life transition</option>
              <option>Relationship difficulties</option>
              <option>Something else</option>
            </select>
          </div>
          <!--div class="form-group">
              <label for="alt_phone">Emergency Contact</label>
              <input type="number" id="alt_phone" name="alt_phone" placeholder="+91-XXXXXXXXXX" required />
          </div>

          <div class="form-group">
              <label for="alt_phone">Emergency Contact</label>
              <input type="number" id="alt_phone" name="alt_phone" placeholder="+91-XXXXXXXXXX" required />
          </div-->

          <div class="form-group">
              <label for="past">Please share any past relevant psychiatric treatment or therapy, if any.</label>
              <input type="text" id="past" name="past" placeholder="" />
          </div>

          <div class="form-group">
            <label for="message">Anything else you'd like to share (optional)</label>
            <textarea id="message" name="message" placeholder="Share as much or as little as feels right…"></textarea>
          </div>
          <!--a href="{{ ('consent') }}">Terms and condition</a-->

<div>
    <input type="checkbox" id="agree" required onchange="toggleButton()">
    <label for="agree">
        I agree to the 
        <a href="{{ ('consent') }}">
            Terms and Conditions
        </a>
    </label>
</div>

<br>

<button type="submit" id="registerBtn" class="form-submit" disabled>
    Register yourself
</button>

<script>
function toggleButton() {
    const checkbox = document.getElementById("agree");
    const button = document.getElementById("registerBtn");

    button.disabled = !checkbox.checked;
}
</script>



          <!--button type="submit" class="form-submit">Register yourself</button-->
          <p class="form-note">This form is confidential. I respond within one business day.</p>
        </form>
        <div class="form-success" id="formSuccess">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <h3>Thank you, <span id="successName"></span>.</h3>
          <p style="font-size:0.9rem;color:var(--mid);margin-top:0.5rem;">I'll be in touch within one business day to schedule your free consultation.</p>
        </div>
      </div>
    </div>
  </section>
 </form>
  {% endblock %}
