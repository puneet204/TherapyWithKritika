{% extends 'base.html' %}
{% block title %}
  Sign-Up
{% endblock %}
 {% block style %}
 <style>
/* Home Button */
.top-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 18px;
  background: white;
  color: #4ca1af;
  border-radius: 25px;
  text-decoration: none;
  font-weight: 500;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.top-btn:hover {
  background: #4ca1af;
  color: white;
}
</style>
 {% endblock %}
{% block content1 %}
<form method="POST">
    <h3 align="center">Sign-Up</h3>
    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" name="email" class="form-control" id="email" aria-placeholder="Enter Email Address" required/>
    </div>
    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" name="name" class="form-control" id="name" aria-placeholder="Enter Your Name" required/>
    </div>
    
  <div class="form-group">
        <label for="uname">Preferred User Name</label>
        <input type="text" name="uname" class="form-control" id="uname" aria-placeholder="Enter Your Preferred uname" required/>
    </div>

    <div class="form-group">
        <label for="password1">Password</label>
        <input type="password" name="password1" class="form-control" id="password1" aria-placeholder="Enter Your Password" required/>
    </div>

    <div class="form-group">
        <label for="password2">Repeat Password</label>
        <input type="password" name="password2" class="form-control" id="password2" aria-placeholder="Repeate Your Password" required/>
    </div>
    <br />
    <button type="submit" class="btn btn-primary">Submit</button>
</form>

<a href="/" class="top-btn">Home</a>

{% endblock %}
